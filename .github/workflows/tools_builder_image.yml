name: 'Tool image builder'

# Reusable workflow to build tool docker images from the docker context
# artifact generated by tools_ci.yml.
# Each matrix entry carries a "chain": the tool's transitive dependencies in
# build order followed by the tool itself. Entries marked "build" are built
# and pushed by this job, entries marked "require" are built elsewhere and
# only checked, so dependency chains of arbitrary depth are supported.

on:
  workflow_call:
    inputs:
      matrix:
        type: string
        required: true
        description: JSON matrix of tool image chains to build

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.tool }} tool
    runs-on: ubuntu-latest

    timeout-minutes: 360

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Download docker artifacts
        uses: actions/download-artifact@v8
        with:
          name: tools

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.PACKAGES_ACTOR }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push tool image chain
        env:
          CHAIN: ${{ matrix.chain }}
        run: |
          mapfile -t entries < <(jq -c '.[]' <<< "$CHAIN")
          for entry in "${entries[@]}"; do
            tool=$(jq -r '.tool' <<< "$entry")
            name=$(jq -r '.name' <<< "$entry")
            check_name=$(jq -r '.check_name' <<< "$entry")
            action=$(jq -r '.action' <<< "$entry")

            if [ "$action" == "require" ]; then
              echo "Checking for required $tool image"
              if ! docker manifest inspect "$check_name" > /dev/null; then
                echo "::error::Required image $check_name for $tool is not available, its build likely failed"
                exit 1
              fi
            else
              echo "::group::Build $tool image"
              docker build "./sc_$tool/" --tag "$name" --tag "$check_name"
              docker push "$name"
              docker push "$check_name"
              docker image prune -f
              echo "::endgroup::"
            fi
          done
